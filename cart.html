<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | YA GAREEBNAWAZ CSC</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Cart Specific Compact CSS */
        .cart-wrapper { max-width: 1100px; margin: 40px auto; padding: 0 20px; position: relative; z-index: 10; }
        .cart-items-box { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.06); margin-bottom: 30px; border: 1px solid #eee; }
        .cart-header, .cart-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-header { font-weight: bold; color: #003366; border-bottom: 2px solid #003366; }
        .cart-row:hover { background: #fdfaf2; border-radius: 8px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; justify-content: center; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #003366; cursor: pointer; background: white; font-weight: bold; color: #003366; transition: 0.2s; }
        .qty-btn:hover { background: #003366; color: white; }
        .checkout-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        .customer-card, .summary-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 5px; color: #444; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        .input-group input:focus { border-color: #003366; }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; color: #555; }
        .summary-total { font-size: 1.6rem; font-weight: 800; border-top: 2px dashed #ddd; padding-top: 15px; margin-top: 10px; color: #003366; }
        .place-order-btn { width: 100%; background: #003366; color: white; padding: 18px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,51,102,0.2); }
        .place-order-btn:hover { background: #d63384; transform: translateY(-3px); }
        
        @media (max-width: 850px) { 
            .checkout-grid { grid-template-columns: 1fr; } 
            .cart-header { display: none; } 
            .cart-row { grid-template-columns: 1fr; text-align: center; gap: 10px; padding: 20px; background: #f9f9f9; border-radius: 15px; margin-bottom: 10px; } 
        }
    </style>
</head>
<body>

    <header id="main-header"></header>

    <div class="cart-wrapper">
        <h2 style="font-family:'Cambria', serif; font-size: 2.5rem; color:#003366; margin-bottom: 25px;">Your Cart 🛒</h2>
        
        <div class="cart-items-box" id="cart-display"></div>

        <div class="checkout-grid" id="checkout-section">
            <div class="customer-card">
                <h3 style="color: #003366; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Customer Details</h3>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="cust-name" placeholder="Enter Customer Name">
                </div>
                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="cust-mobile" maxlength="10" placeholder="10 Digit Mobile Number">
                </div>
                <div class="input-group">
                    <label>Appointment / Order Date</label>
                    <input type="date" id="cust-date">
                </div>
            </div>

            <div class="summary-card">
                <h3 style="color: #003366; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Order Summary</h3>
                <div class="input-group">
                    <label style="color:#d63384; font-weight: bold;">Manual Discount (₹) [Optional]</label>
                    <input type="number" id="manual-discount" value="0" min="0" oninput="renderCartPage()" placeholder="0">
                </div>
                
                <div class="summary-line"><span>Total Amount:</span> <span id="summary-subtotal" style="font-weight: bold;">₹0</span></div>
                <div class="summary-line" style="color: #28a745; font-weight: bold;"><span>Discount:</span> <span id="summary-discount">-₹0</span></div>
                <div class="summary-total"><span>Final Payable:</span> <span id="summary-total">₹0</span></div>
                
                <button class="place-order-btn" onclick="processOrder()">Confirm & Generate Receipt ✨</button>
            </div>
        </div>
    </div>

    <footer id="main-footer"></footer>

    <script src="logic.js"></script>
    <script src="newlogic.js"></script>
    
    <script>
        // Page load hote hi aaj ki date set karne ka function
        function setTodayDate() {
            let dateInput = document.getElementById('cust-date');
            if(dateInput) {
                let today = new Date();
                let dd = String(today.getDate()).padStart(2, '0');
                let mm = String(today.getMonth() + 1).padStart(2, '0'); // January is 0!
                let yyyy = today.getFullYear();
                dateInput.value = yyyy + '-' + mm + '-' + dd;
            }
        }

        function renderCartPage() {
            let cart = JSON.parse(localStorage.getItem('cscCart')) || [];
            let display = document.getElementById('cart-display');
            let totalAmount = 0;

            if (cart.length === 0) {
                display.innerHTML = `
                    <div style='text-align:center; padding:40px;'>
                        <h3 style='color:#555;'>Your cart is empty!</h3>
                        <p style='color:#888; margin-bottom:20px;'>Lagta hai aapne abhi tak koi service add nahi ki hai.</p>
                        <a href='aadhaar.html' style='display:inline-block; background:#003366; color:white; padding:12px 25px; text-decoration:none; border-radius:25px; font-weight:bold;'>Add Services</a>
                    </div>`;
                document.getElementById('checkout-section').style.display = 'none';
                
                // Header ka count update
                let countBadge = document.getElementById('cart-count');
                if(countBadge) countBadge.innerText = '0';
                return;
            }

            document.getElementById('checkout-section').style.display = 'grid';
            let html = `<div class="cart-header"><div>Service</div><div>Rate</div><div style="text-align:center;">Qty</div><div style="text-align:right; padding-right:15px;">Total</div><div style="text-align:center;">Action</div></div>`;
            
            cart.forEach((item, index) => {
                // Bug Fix: Har format ka price safely pakdega
                let rate = parseFloat(item.basePrice || item.price || item.Price || item.rate || item.amount) || 0;
                let qty = parseInt(item.qty || item.quantity) || 1;
                
                let rowTotal = rate * qty;
                totalAmount += rowTotal;

                html += `<div class="cart-row">
                    <div style="font-weight:600; color:#333;">${item.name || 'Service'}</div>
                    <div style="color:#555;">₹${rate}</div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                        <span style="font-weight:bold; width:20px; text-align:center;">${qty}</span>
                        <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                    </div>
                    <div style="font-weight:bold; color:#d63384; text-align:right; padding-right:15px;">₹${rowTotal}</div>
                    <div style="text-align:center;">
                        <button onclick="removeItem(${index})" style="color:#ff4d4d; border:none; background:none; cursor:pointer; font-size:1.2rem; transition:0.3s;" onmouseover="this.style.color='#cc0000'" onmouseout="this.style.color='#ff4d4d'"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            });
            display.innerHTML = html;

            let manualOffInput = document.getElementById('manual-discount');
            let manualOff = manualOffInput && manualOffInput.value ? parseFloat(manualOffInput.value) : 0;
            
            let finalBill = totalAmount - manualOff;
            if (finalBill < 0) finalBill = 0; // Negative bill nahi hona chahiye
            
            document.getElementById('summary-subtotal').innerText = '₹' + totalAmount;
            document.getElementById('summary-discount').innerText = '-₹' + manualOff;
            document.getElementById('summary-total').innerText = '₹' + finalBill;

            // Data checkout page ke liye ready kar ke save karna
            localStorage.setItem('cscFinalBill', JSON.stringify({
                base: totalAmount, 
                manual: manualOff, 
                grandTotal: finalBill
            }));

            // Header ka count update
            let countBadge = document.getElementById('cart-count');
            if(countBadge) countBadge.innerText = cart.length;
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('cscCart')) || [];
            if(cart[index]) {
                cart[index].qty = (parseInt(cart[index].qty) || 1) + change;
                if (cart[index].qty < 1) cart[index].qty = 1; // 1 se kam items nahi honge
                localStorage.setItem('cscCart', JSON.stringify(cart));
                renderCartPage();
            }
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cscCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cscCart', JSON.stringify(cart));
            renderCartPage();
        }

        function processOrder() {
            let nameField = document.getElementById('cust-name').value.trim();
            let mobileField = document.getElementById('cust-mobile').value.trim();
            let dateField = document.getElementById('cust-date').value;

            if(!nameField || !mobileField) { 
                alert("Bhai, kam se kam Customer ka Naam aur Mobile Number zaroor bhariye!"); 
                return; 
            }

            const customer = {
                name: nameField,
                mobile: mobileField,
                date: dateField
            };
            
            localStorage.setItem('cscCustomer', JSON.stringify(customer));
            // Ensure cart final bill is saved exactly before redirect
            renderCartPage(); 
            window.location.href = "checkout.html";
        }

        // Failsafe Execution: Windows load hone par functions chalana
        window.addEventListener('DOMContentLoaded', () => {
            if(typeof loadHeader === 'function') loadHeader();
            if(typeof loadFooter === 'function') loadFooter();
            setTodayDate();
            renderCartPage();
        });
    </script>
</body>
</html>
