<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | YA GAREEBNAWAZ CSC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="commonstyle.css">
    <link rel="stylesheet" href="responsive.css">

    <style>
        /* FrostySphere Cart Specific Styling */
        .cart-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            z-index: 10;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #007bff;
        }

        .cart-item h4 { margin: 0; color: #003366; font-size: 1.1rem; }
        
        .remove-btn {
            background: #ffe6e6;
            color: #ff4d4d;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
        }
        .remove-btn:hover { background: #ff4d4d; color: white; }

        .checkout-btn {
            display: block;
            width: 100%;
            background: linear-gradient(45deg, #25D366, #1ebd57);
            color: white;
            text-align: center;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
        .checkout-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4); }

        .total-box {
            text-align: right;
            font-size: 1.6rem;
            font-weight: 800;
            color: #d63384;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }

        /* Mobile Fixes for Cart */
        @media (max-width: 600px) {
            .cart-container { padding: 20px; margin: 30px 15px; }
            .cart-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .cart-item > div:last-child { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="background-blobs"></div>

    <header id="main-header"></header>

    <div class="cart-container">
        <h2 style="text-align: center; color: #003366; font-family: 'Playfair Display', serif; margin-bottom: 30px; font-size: 2rem;">
            🛒 Shopping Cart
        </h2>
        
        <div id="cart-items-container">
            </div>

        <div class="total-box" id="cart-total">
            Grand Total: ₹0
        </div>

        <a href="#" id="whatsapp-checkout" class="checkout-btn" onclick="sendToWhatsApp()">
            <i class="fab fa-whatsapp" style="font-size: 1.4rem; margin-right: 8px; vertical-align: middle;"></i> Send Request via WhatsApp
        </a>
    </div>

    <script src="newlogic.js"></script>
    
    <script>
        // Bismillah
        
        function renderCart() {
            const cartContainer = document.getElementById('cart-items-container');
            const totalBox = document.getElementById('cart-total');
            const waBtn = document.getElementById('whatsapp-checkout');
            
            // LocalStorage se items uthana
            let cart = JSON.parse(localStorage.getItem('cscCart')) || [];
            
            cartContainer.innerHTML = '';
            let total = 0;

            // Agar cart khali hai
            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div style="text-align:center; padding: 40px 0;">
                        <i class="fas fa-box-open" style="font-size: 4rem; color: #ccc; margin-bottom: 15px;"></i>
                        <h3 style="color: #888;">Cart is empty</h3>
                        <p style="color: #aaa;">Please go back and add services to your cart.</p>
                    </div>`;
                totalBox.style.display = 'none';
                waBtn.style.display = 'none';
                return;
            }

            totalBox.style.display = 'block';
            waBtn.style.display = 'block';

            // Items loop karke HTML banana
            cart.forEach((item, index) => {
                let subtotal = item.price * item.qty;
                total += subtotal;
                
                cartContainer.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <h4>${item.name}</h4>
                            <p style="margin: 5px 0 0 0; font-size: 0.9rem; color: #666; font-weight: bold;">
                                ₹${item.price} <span style="font-weight: normal;">x ${item.qty}</span>
                            </p>
                        </div>
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <span style="font-weight: 800; color: #007bff; font-size: 1.1rem;">₹${subtotal}</span>
                            <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });

            totalBox.innerHTML = 'Grand Total: ₹' + total;
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cscCart')) || [];
            cart.splice(index, 1); // Delete item
            localStorage.setItem('cscCart', JSON.stringify(cart)); // Update storage
            renderCart(); // Re-render
            if(typeof updateUI === 'function') updateUI(); // Header count update karega
        }

        function sendToWhatsApp() {
            let cart = JSON.parse(localStorage.getItem('cscCart')) || [];
            if (cart.length === 0) return;

            let message = "Assalamu Alaikum! YA GAREEBNAWAZ CSC,%0A%0AMujhe in services ki zaroorat hai:%0A%0A";
            let total = 0;

            cart.forEach((item, index) => {
                let subtotal = item.price * item.qty;
                total += subtotal;
                message += `▪️ *${item.name}*%0A   (Qty: ${item.qty}) - ₹${subtotal}%0A`;
            });

            message += `%0A*Grand Total: ₹${total}*%0A%0AKripya mera form process karein.`;
            
            // IMPORTANT: Niche 91 ke baad apna WhatsApp number zarur daalein
            let phone = "919999999999"; 
            let url = `https://wa.me/${phone}?text=${message}`;
            
            window.open(url, '_blank');
        }

        // Jab page load ho tab cart dikhaye
        window.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
