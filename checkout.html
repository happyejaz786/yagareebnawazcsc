<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Receipt | YA GAREEBNAWAZ CSC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="commonstyle.css">
    <link rel="stylesheet" href="responsive.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        .receipt-wrapper { max-width: 800px; margin: 50px auto; padding: 0 20px; position: relative; z-index: 10; }
        .receipt-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.8); overflow: hidden; }
        .receipt-header { background: #003366; color: white; text-align: center; padding: 30px 20px; border-bottom: 5px solid #d63384; }
        .receipt-header h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; margin-bottom: 10px; }
        .receipt-header p { font-size: 1rem; color: #e0e0e0; }
        .receipt-body { padding: 40px; }
        .thank-you-msg { text-align: center; font-size: 1.2rem; color: #28a745; font-weight: 600; margin-bottom: 30px; }
        .customer-info-box { background: #fdfaf2; border: 1px solid #f2e2b3; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .customer-info-box p { margin: 8px 0; font-size: 1.05rem; color: #444; }
        .cust-name-highlight { font-family: 'Cambria', serif; font-weight: bold; color: #003366; font-size: 1.3rem; }
        .receipt-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .receipt-table th { background: #f0f4f8; color: #003366; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        .receipt-table td { padding: 15px 12px; border-bottom: 1px solid #eee; color: #555; }
        .total-row { font-size: 1.4rem; font-weight: bold; color: #d63384; background: #fff9eb; }
        
        .action-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; padding-top: 30px; border-top: 2px dashed #ddd; }
        .btn-link { display: block; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 600; color: white; transition: 0.3s; cursor: pointer; border: none; font-size: 1rem; }
        .btn-link:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-wa { background: #25D366; }
        .btn-jpg { background: #d63384; } 
        .btn-google { background: #db4437; }
        .btn-fb { background: #1877F2; }
        .btn-map { background: #4285F4; }
        .btn-web { background: #333; }
    </style>
</head>
<body>

    <div class="background-blobs"></div>
    <header id="main-header"></header>

    <div class="receipt-wrapper">
        <div class="receipt-card" id="print-area">
            <div class="receipt-header">
                <h1>YA GAREEBNAWAZ CSC</h1>
                <p>Digital Service Receipt</p>
            </div>

            <div class="receipt-body">
                <div class="thank-you-msg">
                    <i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                    <span id="dynamic-greeting"></span> Thank you for choosing our services!
                </div>

                <div class="customer-info-box" id="customer-info-container"></div>

                <table class="receipt-table">
                    <thead>
                        <tr>
                            <th>Service Description</th>
                            <th style="text-align: center;">Qty</th>
                            <th style="text-align: right;">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="receipt-items"></tbody>
                </table>
            </div>
        </div>

        <div class="action-links">
            <button id="send-wa-btn" class="btn-link btn-wa" onclick="processWhatsAppOrder()">
                <i class="fab fa-whatsapp"></i> Checkout via WhatsApp
            </button>
            <button class="btn-link btn-jpg" onclick="downloadJPG()">
                <i class="fas fa-download"></i> Download Receipt (JPG)
            </button>
            <a href="https://www.google.com/maps?q=Shahjahanpur" class="btn-link btn-map" target="_blank">
                <i class="fas fa-directions"></i> Get Directions
            </a>
            <a href="https://g.page/r/CaSbnIdP3_saEBE/review" class="btn-link btn-google" target="_blank">
                <i class="fab fa-google"></i> Google Review
            </a>
            <a href="index.html" class="btn-link btn-web" onclick="clearCart()">
                <i class="fas fa-globe"></i> Return to Website
            </a>
        </div>
    </div>

    <footer id="main-footer"></footer>

    <script src="logic.js"></script>
    <script>
        let globalWaLink = "";

        function formatDate(dateString) {
            const dateObj = new Date(dateString);
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return `${dateObj.getDate()}-${months[dateObj.getMonth()]}-${dateObj.getFullYear()}`;
        }

        function generateReceipt() {
            const customerData = JSON.parse(localStorage.getItem('cscCustomer'));
            const cartData = JSON.parse(localStorage.getItem('cscCart'));

            if (!customerData || !cartData) {
                window.location.href = "index.html";
                return;
            }

            const formattedDate = formatDate(customerData.date);
            document.getElementById('dynamic-greeting').innerText = `Dear ${customerData.name},`;

            // Display Customer Info
            const custContainer = document.getElementById('customer-info-container');
            custContainer.innerHTML = `
                <p><strong>Customer Name:</strong> <span class="cust-name-highlight">${customerData.name}</span></p>
                <p><strong>Mobile Number:</strong> +91 ${customerData.mobile}</p>
                <p><strong>Appointment Date:</strong> ${formattedDate}</p>
            `;

            const itemsContainer = document.getElementById('receipt-items');
            let total = 0;
            
            // Fix: Initialize waMessageText before loop
            let waMessageText = `*YA GAREEBNAWAZ CSC - Digital Receipt*%0A%0A*Customer:* ${customerData.name}%0A*Mobile:* ${customerData.mobile}%0A*Date:* ${formattedDate}%0A%0A*Services Details:*%0A`;

            cartData.forEach(item => {
                let subtotal = item.price * item.qty;
                total += subtotal;
                itemsContainer.innerHTML += `
                    <tr>
                        <td>${item.name} <br><small style="color:#888;">₹${item.price} each</small></td>
                        <td style="text-align: center;">${item.qty}</td>
                        <td style="text-align: right; font-weight: bold;">₹${subtotal}</td>
                    </tr>`;
                waMessageText += `▪️ ${item.name} (x${item.qty}) - ₹${subtotal}%0A`;
            });

            itemsContainer.innerHTML += `
                <tr class="total-row">
                    <td colspan="2" style="text-align: right;">Grand Total:</td>
                    <td style="text-align: right;">₹${total}</td>
                </tr>
            `;

            waMessageText += `%0A*Grand Total: ₹${total}*%0A%0AThank you for choosing YA GAREEBNAWAZ CSC!`;
            
            const adminWhatsAppNumber = "917007420882";
            globalWaLink = `https://wa.me/${adminWhatsAppNumber}?text=${waMessageText}`;
        }

        function processWhatsAppOrder() {
            const btn = document.getElementById('send-wa-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving Data...';
            btn.disabled = true;

            const customerData = JSON.parse(localStorage.getItem('cscCustomer'));
            const cartData = JSON.parse(localStorage.getItem('cscCart'));
            const GOOGLE_SHEET_APP_URL = "https://script.google.com/macros/s/AKfycbx9u4vLw1LdJIauzSteyqgzPP7NikQJ1r_7v9ngXvzSz1OPpCXhP5zfxV4LEJrgMqpouQ/exec"; 

            const formData = new FormData();
            formData.append('Name', customerData.name);
            formData.append('Mobile', customerData.mobile);
            formData.append('Date', customerData.date);
            formData.append('OrderDetails', JSON.stringify(cartData));

            fetch(GOOGLE_SHEET_APP_URL, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => {
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Saved Successfully!';
                btn.style.backgroundColor = "#28a745"; 
                setTimeout(() => {
                    window.open(globalWaLink, '_blank');
                    btn.innerHTML = '<i class="fab fa-whatsapp"></i> Checkout via WhatsApp';
                    btn.style.backgroundColor = "#25D366"; 
                    btn.disabled = false;
                }, 1500);
            })
            .catch(() => {
                alert("Network Error!");
                btn.disabled = false;
            });
        }

        function downloadJPG() {
            const printArea = document.getElementById('print-area');
            html2canvas(printArea).then(canvas => {
                const link = document.createElement('a');
                link.download = 'CSC_Receipt.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            });
        }

        function clearCart() {
            localStorage.removeItem('cscCart');
            localStorage.removeItem('cscCustomer');
        }

        window.onload = function() {
            generateReceipt();
        };
    </script>
</body>
</html>
