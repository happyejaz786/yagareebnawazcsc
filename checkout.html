<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Receipt | YA GAREEBNAWAZ CSC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="commonstyle.css">
    <link rel="stylesheet" href="responsive.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Cambria', serif; font-weight: bold; background: #f4f4f4; color: #333; }
        .receipt-wrapper { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .receipt-card { background: #fff; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); border: 2px solid #000; overflow: hidden; }
        .receipt-header { background: #003366; color: white; padding: 25px; display: flex; align-items: center; justify-content: center; gap: 20px; border-bottom: 4px solid #d63384; }
        .shop-logo { width: 85px; height: 85px; object-fit: cover; border-radius: 5px; background: white; }
        .shop-details { text-align: left; }
        .receipt-body { padding: 30px; }
        .customer-info-box { display: flex; justify-content: space-between; align-items: flex-start; background: #fdfaf2; border: 1px solid #000; padding: 15px; border-radius: 5px; margin-bottom: 25px; font-size: 1.1rem; }
        .receipt-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .receipt-table th, .receipt-table td { border: 1px solid #000; padding: 12px; }
        .summary-section { width: 100%; border-top: 2px solid #000; padding-top: 10px; }
        .summary-row { display: flex; justify-content: flex-end; padding: 5px 0; font-size: 1.1rem; }
        .summary-label { width: 200px; text-align: right; padding-right: 40px; }
        .summary-value { width: 120px; text-align: right; }
        .grand-total-box { background: #fff9eb; padding: 15px; display: flex; justify-content: flex-end; border: 2px solid #000; margin-top: 10px; }
        .action-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; padding-bottom: 40px; }
        .btn-link { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 15px; border-radius: 5px; text-decoration: none; font-weight: bold; color: white; cursor: pointer; border: none; font-size: 0.9rem; }
        .btn-wa { background: #25D366; } .btn-jpg { background: #d63384; } .btn-map { background: #4285F4; }
        .btn-google { background: #db4437; } .btn-fb { background: #1877F2; } .btn-web { background: #333; }
        @media (max-width: 700px) { .action-links { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header id="main-header"></header>

    <div class="receipt-wrapper">
        <div class="receipt-card" id="print-area">
            <div class="receipt-header">
                <img src="images/logo.jpg" alt="Logo" class="shop-logo">
                <div class="shop-details">
                    <h1 style="margin:0;">YA GAREEBNAWAZ CSC</h1>
                    <p>Prop: Mohammad Ejaz Khan</p>
                    <p>Mohalla Alizai near National Girls Inter College Shahjahanpur</p>
                    <p>Contact: +91 7007420882</p>
                </div>
            </div>
            <div class="receipt-body">
                <div class="customer-info-box">
                    <div id="cust-left"></div>
                    <div id="cust-right" style="text-align: right;"></div>
                </div>
                <table class="receipt-table">
                    <thead><tr><th>Service</th><th style="text-align: center;">Qty</th><th style="text-align: right;">Amount</th></tr></thead>
                    <tbody id="receipt-items"></tbody>
                </table>
                <div class="summary-section">
                    <div class="summary-row"><div class="summary-label">Subtotal:</div><div class="summary-value" id="sub-total"></div></div>
                    <div class="summary-row" style="color: green;"><div class="summary-label">Total Savings:</div><div class="summary-value" id="save-total"></div></div>
                    <div class="grand-total-box">
                        <div style="font-size:1.4rem; color:#d63384; padding-right:40px;">Grand Total:</div>
                        <div style="font-size:1.4rem; color:#d63384;" id="grand-total"></div>
                    </div>
                </div>
                <p style="text-align: center; margin-top: 25px; font-weight: bold; color: #003366;">हमारी सेवाएँ लेने के लिए धन्यवाद दोबारा सेवा का अवसर दें</p>
            </div>
        </div>

        <div class="action-links">
            <button class="btn-link btn-wa" onclick="processWhatsAppOrder()"><i class="fab fa-whatsapp"></i> Save & WhatsApp</button>
            <button class="btn-link btn-jpg" onclick="downloadJPG()"><i class="fas fa-download"></i> Download JPG</button>
            <a href="https://www.google.com/maps/dir/27.8730403,79.9066366/National+CSC+AADHAAR+UPDATE+CENTER,+Alizai,+near+badi+masjid,+Shahjahanpur,+Uttar+Pradesh+242001,+India/@27.8732635,79.9042067,17z/data=!3m1!4b1!4m17!1m7!3m6!1s0x399fbd97a351e0e3:0x1afbdf4f879c9ba4!2sNational+CSC+AADHAAR+UPDATE+CENTER!8m2!3d27.8731395!4d79.9068512!16s%2Fg%2F11spdq9db0!4m8!1m1!4e1!1m5!1m1!1s0x399fbd97a351e0e3:0x1afbdf4f879c9ba4!2m2!1d79.9068512!2d27.8731395?entry=ttu&g_ep=EgoyMDI2MDIyNS4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn-link btn-map"><i class="fas fa-directions"></i> Location</a>
            <a href="https://g.page/r/CaSbnIdP3_saEBE/review" target="_blank" class="btn-link btn-google"><i class="fab fa-google"></i> Review</a>
            <a href="https://facebook.com/Nationalcscdigitalsevakendra" target="_blank" class="btn-link btn-fb"><i class="fab fa-facebook"></i> Facebook</a>
            <a href="index.html" class="btn-link btn-web"><i class="fas fa-home"></i> Home</a>
        </div>
    </div>

    <footer id="main-footer"></footer>

    <script src="logic.js"></script>
    <script src="newlogic.js"></script>

    <script>
        window.onload = function() {
            if(typeof loadHeader === 'function') loadHeader();
            if(typeof loadFooter === 'function') loadFooter();

            const customer = JSON.parse(localStorage.getItem('cscCustomer')) || {};
            const cart = JSON.parse(localStorage.getItem('cscCart')) || [];
            const bill = JSON.parse(localStorage.getItem('cscFinalBill')) || {};
            
            document.getElementById('cust-left').innerHTML = `<strong>Name:</strong> ${customer.name || 'N/A'}<br><strong>Date:</strong> ${customer.date || ''}`;
            document.getElementById('cust-right').innerHTML = `<strong>Mobile:</strong> +91 ${customer.mobile || ''}<br><strong>ID:</strong> #CSC${Date.now().toString().slice(-5)}`;
            
            let itemsHtml = "";
            cart.forEach(item => {
                let rate = parseFloat(item.basePrice) || 0;
                let q = parseInt(item.qty) || 0;
                itemsHtml += `<tr><td>${item.name}</td><td align="center">${q}</td><td align="right">₹${rate * q}</td></tr>`;
            });
            document.getElementById('receipt-items').innerHTML = itemsHtml;

            let subtotal = parseFloat(bill.base) || 0;
            let grandTotal = parseFloat(bill.grandTotal) || 0;
            let totalSavings = subtotal - grandTotal;

            document.getElementById('sub-total').innerText = "₹" + subtotal;
            document.getElementById('save-total').innerText = "-₹" + (totalSavings < 0 ? 0 : totalSavings);
            document.getElementById('grand-total').innerText = "₹" + grandTotal;
        };

        function downloadJPG() {
            const printArea = document.getElementById('print-area');
            html2canvas(printArea, { scale: 3, useCORS: true, allowTaint: true, backgroundColor: "#ffffff" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `CSC_Receipt_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            });
        }

        function processWhatsAppOrder() {
            const customer = JSON.parse(localStorage.getItem('cscCustomer'));
            const bill = JSON.parse(localStorage.getItem('cscFinalBill'));
            const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbx9u4vLw1LdJIauzSteyqgzPP7NikQJ1r_7v9ngXvzSz1OPpCXhP5zfxV4LEJrgMqpouQ/exec"; 

            const formData = new FormData();
            formData.append('Name', customer.name);
            formData.append('Mobile', customer.mobile);
            formData.append('Date', customer.date);
            formData.append('OrderDetails', `Total Bill: ₹${bill.grandTotal}`);

            fetch(GOOGLE_SHEET_URL, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => {
                alert("✅ Data Saved Successfully!");
                let waMsg = `*YA GAREEBNAWAZ CSC*%0A*Customer:* ${customer.name}%0A*Total Bill:* ₹${bill.grandTotal}%0A*Date:* ${customer.date}`;
                window.open(`https://wa.me/917007420882?text=${waMsg}`, '_blank');
            }).catch(() => alert("Error saving data. Please check internet."));
        }
    </script>
</body>
</html>
